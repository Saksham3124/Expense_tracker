{% extends 'base.html' %}

{% block content %}

<div class="min-h-[90vh] flex items-center justify-center relative overflow-hidden px-4">

<!-- Background blobs -->

<div class="absolute w-96 h-96 bg-blue-500 opacity-20 blur-3xl rounded-full top-10 left-10 animate-pulse"></div>
<div class="absolute w-96 h-96 bg-purple-500 opacity-20 blur-3xl rounded-full bottom-10 right-10 animate-pulse"></div>


<!-- Login Card -->

<div class="relative z-10 w-full max-w-md backdrop-blur-lg bg-white/80 dark:bg-gray-800/80 shadow-2xl rounded-2xl p-8 border border-gray-200 dark:border-gray-700">

<!-- Header -->

<div class="text-center mb-8">

<div class="text-4xl mb-2">💰</div>

<h2 class="text-2xl font-bold text-gray-800 dark:text-white">
Expense Tracker
</h2>

<p class="text-sm text-gray-500 dark:text-gray-400">
Sign in to manage your finances
</p>

</div>



<form method="POST" class="space-y-5" id="loginForm">

{% csrf_token %}

{% if form.non_field_errors %}

<div class="bg-red-100 border border-red-400 text-red-700 px-4 py-3 rounded">

{% for error in form.non_field_errors %}
<p>{{ error }}</p>
{% endfor %}

</div>

{% endif %}



<!-- Username -->

<div>

<label class="block text-sm font-medium mb-1 text-gray-700 dark:text-gray-300">
Username
</label>

<div class="relative">

<span class="absolute left-3 top-2.5 text-gray-400">👤</span>

<input
type="text"
name="username"
required
class="w-full pl-9 pr-3 py-2 rounded-lg border border-gray-300 dark:border-gray-600
bg-white dark:bg-gray-700 text-gray-900 dark:text-gray-100
focus:outline-none focus:ring-2 focus:ring-blue-500 transition"
/>

</div>

</div>



<!-- Password -->

<div>

<label class="block text-sm font-medium mb-1 text-gray-700 dark:text-gray-300">
Password
</label>

<div class="relative">

<span class="absolute left-3 top-2.5 text-gray-400">🔒</span>

<input
id="password"
type="password"
name="password"
required
class="w-full pl-9 pr-10 py-2 rounded-lg border border-gray-300 dark:border-gray-600
bg-white dark:bg-gray-700 text-gray-900 dark:text-gray-100
focus:outline-none focus:ring-2 focus:ring-blue-500 transition"
/>

<button
type="button"
onclick="togglePassword()"
class="absolute right-3 top-2.5 text-gray-400 hover:text-gray-600">

👁

</button>

</div>

</div>



<!-- Remember + Forgot -->

<div class="flex justify-between text-sm text-gray-600 dark:text-gray-400">

<label class="flex items-center gap-2">
<input type="checkbox" class="accent-blue-600">
Remember me
</label>

<a href="{% url 'password_reset' %}" class="text-blue-500 hover:underline">
Forgot password?
</a>

</div>



<!-- Login Button -->

<button
id="loginBtn"
type="submit"
class="w-full bg-blue-600 hover:bg-blue-700 text-white py-2 rounded-lg font-medium transition shadow-lg">

Login

</button>

</form>



<!-- Signup -->

<p class="mt-6 text-center text-sm text-gray-600 dark:text-gray-300">

New user?

<a href="{% url 'signup' %}" class="text-blue-500 hover:underline">
Create account
</a>

</p>

</div>

</div>



<script>

function togglePassword(){
const field = document.getElementById("password");
field.type = field.type === "password" ? "text" : "password";
}


document.getElementById("loginForm").addEventListener("submit", function(){

const btn = document.getElementById("loginBtn");

btn.innerText = "Logging in...";
btn.disabled = true;

});

</script>

{% endblock %}
