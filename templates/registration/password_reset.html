{% extends "base.html" %}

{% block content %}

<div class="min-h-[70vh] flex items-center justify-center">

<div class="w-full max-w-md bg-white dark:bg-gray-800 shadow-xl rounded-xl p-8">

<h2 class="text-2xl font-semibold text-center mb-6 text-gray-800 dark:text-gray-100">
Reset Password
</h2>

<form method="post" class="space-y-5">
{% csrf_token %}

<div>
<label class="block text-sm font-medium mb-1 text-gray-700 dark:text-gray-300">
Email Address
</label>

{{ form.email }}

{% if form.email.errors %}
<p class="text-red-500 text-sm mt-1">
{{ form.email.errors.0 }}
</p>
{% endif %}
</div>

<button
type="submit"
class="w-full bg-blue-600 hover:bg-blue-700 text-white py-2 rounded-lg transition font-medium">
Send Reset Email
</button>

</form>

<p class="mt-6 text-center text-sm text-gray-600 dark:text-gray-300">
<a href="{% url 'login' %}" class="text-blue-600 hover:underline">
Back to Login
</a>
</p>

</div>

</div>

{% endblock %}
