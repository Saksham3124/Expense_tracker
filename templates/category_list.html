{% extends 'base.html' %}

{% block content %}

<div class="max-w-6xl mx-auto px-4 py-8">

<!-- PAGE HEADER -->

<div class="flex items-center justify-between mb-8">

<h2 class="text-2xl font-semibold text-gray-800 dark:text-gray-100">
Your Categories
</h2>

<a
href="{% url 'add_category' %}"
class="bg-blue-600 hover:bg-blue-700 text-white px-4 py-2 rounded-lg transition">
Add Category
</a>

</div>



<!-- CATEGORY BUDGET SECTION -->

<div class="bg-white dark:bg-gray-800 border border-gray-200 dark:border-gray-700
rounded-xl shadow p-6">

<h3 class="text-xl font-semibold mb-6 text-gray-800 dark:text-gray-100">
Category Budgets
</h3>


<div class="grid md:grid-cols-2 lg:grid-cols-3 gap-6">

{% for category in categories %}

<!-- CATEGORY CARD -->

<div class="bg-gray-50 dark:bg-gray-900
border border-gray-200 dark:border-gray-700
p-5 rounded-xl hover:shadow-lg transition">

<div class="flex justify-between items-center mb-4">

<h4 class="text-lg font-semibold text-gray-800 dark:text-gray-100">
{{ category.name }}
</h4>

<div class="flex gap-3 text-sm">

<a href="{% url 'edit_category' category.id %}"
class="text-blue-600 dark:text-blue-400 hover:underline">
Edit
</a>

<a href="{% url 'delete_category' category.id %}"
class="text-red-600 dark:text-red-400 hover:underline">
Delete
</a>

</div>

</div>


<!-- BUDGET FORM -->

<form method="POST"
action="{% url 'update_budget' category.id %}"
class="flex items-center gap-3">

{% csrf_token %}

<input
type="number"
step="0.01"
name="budget"
placeholder="Monthly Budget"
value="{{ category.budget|default:'' }}"
class="flex-1 px-3 py-2 rounded-lg
border border-gray-300
bg-white text-gray-800
dark:bg-gray-700 dark:text-white dark:border-gray-600
focus:outline-none focus:ring-2 focus:ring-blue-500"
/>

<button
class="bg-green-600 hover:bg-green-700 text-white px-4 py-2 rounded-lg">
Save
</button>

</form>

</div>

{% empty %}

<p class="text-gray-600 dark:text-gray-400">
No categories found. Create one using the "Add Category" button.
</p>

{% endfor %}

</div>

</div>

</div>

{% endblock %}
