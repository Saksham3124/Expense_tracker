{% extends "base.html" %}

{% block content %}

<div class="max-w-md mx-auto bg-white dark:bg-gray-800 shadow-lg rounded-xl p-8">

<h2 class="text-2xl font-semibold mb-6 text-center text-gray-800 dark:text-gray-100">
Add Category
</h2>

<form method="POST" class="space-y-5">

{% csrf_token %}

<div>

<label class="block text-sm font-medium mb-2 text-gray-700 dark:text-gray-300">
Category Name
</label>

<input
type="text"
name="name"
placeholder="Category name"
required
class="w-full border rounded-lg p-2 bg-white dark:bg-gray-700 dark:text-white focus:outline-none focus:ring-2 focus:ring-blue-500"/>

</div>

<div class="flex gap-3">

<button
type="submit"
class="flex-1 bg-blue-600 hover:bg-blue-700 text-white py-2 rounded-lg transition font-medium">Save </button>

<a
href="{% url 'category_list' %}"
class="flex-1 text-center bg-gray-500 hover:bg-gray-600 text-white py-2 rounded-lg transition">Cancel </a>

</div>

</form>

</div>

{% endblock %}
