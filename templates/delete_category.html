{% extends "base.html" %}

{% block content %}

<div class="max-w-md mx-auto bg-white dark:bg-gray-800 shadow-lg rounded-xl p-8 text-center">

<h2 class="text-2xl font-semibold mb-4 text-gray-800 dark:text-gray-100">
Delete Category
</h2>

<p class="text-gray-700 dark:text-gray-300 mb-6">
Are you sure you want to delete
<span class="font-semibold">"{{ category.name }}"</span>?
</p>

<form method="POST" class="space-y-4">
{% csrf_token %}

<button
type="submit"
class="w-full bg-red-600 hover:bg-red-700 text-white py-2 rounded-lg transition font-medium">Yes, Delete </button>

</form>

<a
href="{% url 'category_list' %}"
class="block mt-4 text-blue-600 hover:underline">Cancel </a>

</div>

{% endblock %}
